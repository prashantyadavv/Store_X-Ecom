<!DOCTYPE html>
<html>
<head>

<title>Store_X</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f3f3f3;
}

/* NAVBAR */

.navbar{
    background:#131921;
    color:white;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

/* CATEGORY SECTION */

.container{
    width:90%;
    margin:auto;
}

.section-title{
    font-size:28px;
    margin:30px 0;
}

.categories{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:8px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

a{
    text-decoration:none;
    color:black;
}

</style>

</head>

<body>

<div class="navbar">
Store_X
</div>

<div class="container">

<div class="section-title">Shop by Category</div>

<div class="categories">

{% for category in categories %}

<a href="{% url 'category_products' category.id %}">

<div class="card">

<img src="{{ category.image.url }}">

<h3>{{ category.name }}</h3>

</div>

</a>

{% endfor %}

</div>

</div>

</body>
</html>
