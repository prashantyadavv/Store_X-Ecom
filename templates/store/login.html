<!DOCTYPE html>
<html>
<head>

<title>Login - Store_X</title>

{% if form.errors %}
<p style="color:red; text-align:center;">
Invalid username or password
</p>
{% endif %}

<style>

body{
    font-family: Arial;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ff9900;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e68a00;
}

.signup{
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Login to Store_X</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="signup">

<p>Don't have an account?</p>

<a href="/signup/">Create Account</a>

</div>

</div>

</body>
</html>
